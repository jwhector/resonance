name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Workspace integrity
        run: pnpm check:workspace

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit & integration tests
        run: pnpm test

      - name: Build
        run: pnpm build

  e2e:
    name: e2e (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium
      - name: E2E tests
        run: pnpm test:e2e
        env:
          # The E2E boots under the harness (fake model/embedder/mail) but runs against the real
          # Neon DB so Better Auth can persist users/sessions — `playwright.config.ts` inherits
          # DATABASE_URL from the environment. Without it the auth mount throws at request time
          # ("DATABASE_URL is required to create the production database client").
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
